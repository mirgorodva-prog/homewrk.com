<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сума чисел до N</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
</head>
<body>

    <div class="card">
        <h2>Сума чисел до N</h2>
        
        <div class="input-field">
            <label for="numN">Введіть число N</label>
            <input type="number" id="numN" placeholder="Наприклад: 5" min="1">
        </div>

        <button id="btnSum">Обчислити суму</button>

        <div class="result-box">
            <p>Результат: <span id="resValue">---</span></p>
            <div id="details" style="font-size: 0.9rem; color: #7f8c8d; margin-top: 10px;"></div>
        </div>
    </div>

</body>
</html>
